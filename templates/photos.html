{% extends "layout.html" %}

{% block title %}Photographies{% endblock %}

{% block content %}

<h2 class="mb-4">🖼️ Photographies</h2>

<div class="row">

{% for p in photos %}
  <div class="col-md-4 mb-3">
    <div class="card shadow-sm">

      <img src="{{ url_for('static', filename=p.image_url) }}" class="card-img-top">

      <div class="card-body">

        <h5 class="card-title">{{ p.titre }}</h5>

        <p class="text-muted">
          📷 Auteur : {{ p.auteur }}<br>
          📅 Date : {{ p.date_photo }}<br>
          🏷️ {{ p.categorie }}
        </p>

      </div>

    </div>
  </div>
{% endfor %}

</div>

{% endblock %}
