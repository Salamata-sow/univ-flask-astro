<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Astro{% endblock %}</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<!-- NAVBAR -->
<nav class="navbar navbar-expand-lg navbar-light bg-white shadow-sm">
  <div class="container-fluid">
    <a class="navbar-brand" href="/">Site Astro</a>

    <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#menu">
      <span class="navbar-toggler-icon"></span>
    </button>

    <div class="collapse navbar-collapse" id="menu">
      
      <!-- MENU PRINCIPAL -->
      <ul class="navbar-nav me-auto">
        <li class="nav-item"><a class="nav-link" href="/appareils">Appareils Photo</a></li>
        <li class="nav-item"><a class="nav-link" href="/photos">Photographies</a></li>
        <li class="nav-item"><a class="nav-link" href="/telescopes">Télescopes</a></li>
      </ul>

      <!-- LOGIN / LOGOUT -->
      <ul class="navbar-nav">
        {% if session.user %}
          <li class="nav-item">
            <span class="nav-link">👤 {{ session.user }}</span>
          </li>
          <li class="nav-item">
            <a class="nav-link" href="/logout">Déconnexion</a>
          </li>
        {% else %}
          <li class="nav-item">
            <a class="nav-link" href="/login">Connexion</a>
          </li>
        {% endif %}
      </ul>

    </div>
  </div>
</nav>

<!-- CONTENU -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

<!-- Bootstrap JS -->
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
